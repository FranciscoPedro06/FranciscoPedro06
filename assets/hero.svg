<svg viewBox="0 0 860 300" width="860" height="300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Francisco Pedro - Data Analyst and Full-Stack Developer">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1219"/>
      <stop offset="1" stop-color="#080A0F"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00E5FF" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#00E5FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#FF2E97"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="core" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="3.6"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.1" fill="#19222E"/>
    </pattern>
    <clipPath id="clip">
      <rect x="1" y="1" width="858" height="298" rx="22"/>
    </clipPath>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="858" height="298" rx="22" fill="url(#panel)" stroke="#1C2532" stroke-width="1"/>

  <g clip-path="url(#clip)">
    <rect x="1" y="1" width="858" height="298" fill="url(#dots)" opacity="0.55"/>
    <circle cx="675" cy="150" r="155" fill="url(#orbGlow)"/>

    <!-- floating particles -->
    <g>
      <circle cx="120" cy="62" r="1.5" fill="#00E5FF" opacity="0.5">
        <animate attributeName="cy" values="62;46;62" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="415" cy="252" r="1.3" fill="#00E5FF" opacity="0.4">
        <animate attributeName="cy" values="252;240;252" dur="7.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.08;0.4" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="505" cy="70" r="1.4" fill="#FF2E97" opacity="0.35">
        <animate attributeName="cy" values="70;58;70" dur="5.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;0.06;0.35" dur="5.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="66" cy="214" r="1.2" fill="#00E5FF" opacity="0.4">
        <animate attributeName="cy" values="214;202;214" dur="6.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- top-right availability tag -->
  <g font-family="'Courier New', monospace" font-size="10.5" letter-spacing="2" fill="#6E7F96">
    <circle cx="690" cy="36" r="3.4" fill="#3DFF9E">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="702" y="40">OPEN TO WORK</text>
  </g>

  <!-- ================= ORBITAL 3D OBJECT ================= -->
  <g transform="translate(675 150)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite"/>
      <g transform="rotate(15)">
        <ellipse rx="96" ry="33" fill="none" stroke="#00E5FF" stroke-width="1.4" stroke-opacity="0.55"/>
        <circle cx="96" cy="0" r="3" fill="#00E5FF"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="21s" repeatCount="indefinite"/>
      <g transform="rotate(75)">
        <ellipse rx="96" ry="33" fill="none" stroke="#00E5FF" stroke-width="1.2" stroke-opacity="0.34"/>
        <circle cx="-96" cy="0" r="2.6" fill="#8BE9FF"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="26s" repeatCount="indefinite"/>
      <g transform="rotate(130)">
        <ellipse rx="96" ry="33" fill="none" stroke="#FF2E97" stroke-width="1.2" stroke-opacity="0.32"/>
        <circle cx="96" cy="0" r="2.4" fill="#FF2E97"/>
      </g>
    </g>

    <!-- radar ping -->
    <circle r="6" fill="none" stroke="#00E5FF" stroke-width="1.5">
      <animate attributeName="r" values="6;48" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;0" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <!-- core -->
    <circle r="7" fill="#EAFBFF" filter="url(#core)">
      <animate attributeName="r" values="6;8.6;6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#FFFFFF"/>
  </g>

  <!-- ================= NAME (anaglyph 3D) ================= -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="54" letter-spacing="1">
    <!-- FRANCISCO -->
    <g fill="#FF2E97" opacity="0.85" filter="url(#soft)">
      <text x="58" y="116">FRANCISCO</text>
      <animateTransform attributeName="transform" type="translate" values="-2 -1; -4 -1.6; -2 -1" dur="4s" repeatCount="indefinite"/>
    </g>
    <g fill="#00E5FF" opacity="0.85" filter="url(#soft)">
      <text x="58" y="116">FRANCISCO</text>
      <animateTransform attributeName="transform" type="translate" values="2 1; 4 1.6; 2 1" dur="4s" repeatCount="indefinite"/>
    </g>
    <text x="58" y="116" fill="#F4F8FC">FRANCISCO</text>

    <!-- PEDRO -->
    <g fill="#FF2E97" opacity="0.85" filter="url(#soft)">
      <text x="58" y="172">PEDRO</text>
      <animateTransform attributeName="transform" type="translate" values="-2 -1; -4 -1.6; -2 -1" dur="4s" begin="0.25s" repeatCount="indefinite"/>
    </g>
    <g fill="#00E5FF" opacity="0.85" filter="url(#soft)">
      <text x="58" y="172">PEDRO</text>
      <animateTransform attributeName="transform" type="translate" values="2 1; 4 1.6; 2 1" dur="4s" begin="0.25s" repeatCount="indefinite"/>
    </g>
    <text x="58" y="172" fill="#F4F8FC">PEDRO</text>
  </g>

  <!-- accent bar with glint -->
  <rect x="60" y="186" width="150" height="3" rx="1.5" fill="url(#accent)"/>
  <rect x="60" y="186" width="26" height="3" rx="1.5" fill="#FFFFFF" opacity="0.85">
    <animate attributeName="x" values="60;184;60" keyTimes="0;0.5;1" dur="3.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1"/>
  </rect>

  <!-- subtitle -->
  <text x="60" y="209" font-family="'Courier New', monospace" font-size="14" letter-spacing="3" fill="#8697AD">DATA ANALYST × FULL-STACK DEVELOPER</text>
  <rect x="466" y="198" width="8" height="14" fill="#00E5FF">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- tech line -->
  <text x="60" y="244" font-family="'Courier New', monospace" font-size="11.5" letter-spacing="1.5" fill="#4B5A70">Power BI · Python · SQL · Laravel · React · Node.js</text>
</svg>
